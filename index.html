<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>IPTV Pro UI</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* Header */
header {
  padding: 15px 20px;
  font-size: 22px;
  font-weight: bold;
  background: #141414;
  border-bottom: 1px solid #222;
}

/* Layout */
.container {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 200px;
  background: #111;
  height: 100vh;
  padding: 15px;
  border-right: 1px solid #222;
}

.sidebar h3 {
  color: #aaa;
}

.sidebar button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  background: #222;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.sidebar button:hover {
  background: #e50914;
}

/* Content */
.content {
  flex: 1;
  padding: 20px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

/* Card */
.card {
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.card p {
  padding: 10px;
  font-size: 14px;
}

/* Player */
.player {
  margin-top: 20px;
}

video {
  width: 100%;
  max-height: 500px;
  border-radius: 10px;
  background: black;
}
</style>

</head>

<body>

<header>📺 IPTV Pro</header>

<div class="container">

<div class="sidebar">
  <h3>หมวดหมู่</h3>
  <button onclick="filter('all')">ทั้งหมด</button>
  <button onclick="filter('movie')">หนัง</button>
  <button onclick="filter('news')">ข่าว</button>
   <button onclick="filter('tv')">ทีวี</button>
</div>

<div class="content">

<div class="grid" id="channelList"></div>

<div class="player">
  <video id="video" controls autoplay></video>
</div>

</div>
</div>

<script>
// ตัวอย่างช่อง (แก้เพิ่มได้)

  {

    url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
    category: "news"
  }
];

const list = document.getElementById("channelList");

function render(filterType = "all") {
  list.innerHTML = "";

  channels
    .filter(c => filterType === "all" || c.category === filterType)
    .forEach(ch => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${ch.logo}">
        <p>${ch.name}</p>
      `;
      card.onclick = () => play(ch.url);
      list.appendChild(card);
    });
}

function play(url) {
  const video = document.getElementById("video");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

function filter(type) {
  render(type);
}

render();
</script>

</body>
</html>
