<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>IPTV Pro UI</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  padding: 15px 20px;
  font-size: 22px;
  background: #141414;
}

.container { display: flex; }

.sidebar {
  width: 200px;
  background: #111;
  height: 100vh;
  padding: 15px;
}

.content { flex: 1; padding: 20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.card {
  background: #1c1c1c;
  border-radius: 10px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.card p { padding: 10px; }

/* PLAYER */
.player {
  position: sticky;
  top: 0;
  background: #0f0f0f;
  z-index: 10;
}

video {
  width: 100%;
  max-height: 400px;
  border-radius: 10px;
  background: black;
}

.controls {
  margin-top: 10px;
}

.controls button {
  padding: 8px 12px;
  margin-right: 5px;
  border: none;
  border-radius: 5px;
  background: #e50914;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<header>📺 IPTV Pro</header>

<div class="container">

<div class="sidebar">
  <button onclick="filter('all')">ทั้งหมด</button>
</div>

<div class="content">

<!-- PLAYER -->

<div class="player">
  <video id="video" controls autoplay></video>

  <div class="controls">
    <button onclick="goFullscreen()">🖥️ Fullscreen</button>
    <button onclick="miniPlayer()">📱 Mini Player</button>
  </div>
</div>

<!-- CHANNEL -->

<div class="grid" id="channelList"></div>

</div>
</div>

<script>
const channels = [
  {
    name: "BoxCinema",
    logo: "https://i.imgur.com/LGJlmtp.png",
    url: "https://d3s7x6kmqcnb6b.cloudfront.net/hls/QELTQVA/m.m3u8",
    category: "movie"
  },
  {
    name: "ESPN 2",
    logo: "https://upload.wikimedia.org/wikipedia/commons/6/60/ESPN_logos.png",
    url: "http://sinalprivado.info:80/live/632035/GqGcFV4ntu/22005.ts",
    category: "sports"
  }
];

const list = document.getElementById("channelList");

function render() {
  list.innerHTML = "";

  channels.forEach(ch => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${ch.logo}">
      <p>${ch.name}</p>
    `;
    card.onclick = () => play(ch.url);
    list.appendChild(card);
  });
}

// 🎬 PLAY รองรับหลาย format
function play(url) {
  const video = document.getElementById("video");

  // ล้าง player เก่า
  video.pause();
  video.removeAttribute("src");
  video.load();

  // .m3u8 / .hls
  if (url.includes(".m3u8") || url.includes(".hls")) {
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else {
      video.src = url;
    }
  }
  // .ts
  else if (url.includes(".ts")) {
    video.src = url;
  }
  // fallback
  else {
    video.src = url;
  }
}

// 🖥️ FULLSCREEN
function goFullscreen() {
  const video = document.getElementById("video");
  if (video.requestFullscreen) {
    video.requestFullscreen();
  }
}

// 📱 MINI PLAYER (PiP)
function miniPlayer() {
  const video = document.getElementById("video");

  if (document.pictureInPictureEnabled) {
    video.requestPictureInPicture();
  } else {
    alert("ไม่รองรับ Mini Player");
  }
}

function filter() {
  render();
}

render();
</script>

</body>
</html>
